# ─── OpenDrop Netlify Deployment Configuration ───
# Production build specs and cache headers optimizing P2P streaming and offline-first PWAs.

[build]
  publish = "."

# ─── Single Page Application Deep Routing Rules ───
# Redirects deep linked room routes back to app.html so client-side routers can resolve room parameters.
[[redirects]]
  from = "/room/*"
  to = "/app.html"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ─── Granular HTTP Caching Header Overrides ───
# Ensuring instant client updates on code revisions while caching heavy static media aggressively.

# 1. Disable caching on Service Worker so updates apply instantly
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# 2. Disable caching on PWA Manifest configuration
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"

# 3. short-caching on core app pages to catch revisions
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# 4. Long-term immutable caching for CSS files
[[headers]]
  for = "/css/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 5. Long-term immutable caching for JS files
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 6. Long-term immutable caching for media assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Global Security Controls ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    # Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://*.up.railway.app stun:stun*.l.google.com:19302;"
